name: Anti-Zaglushka Smart Sync 100

on:
  schedule:
    - cron: "0 */1 * * *" 
  workflow_dispatch:

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Fetch and Merge
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 1. Настройки
          SOURCE="https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/WHITE-SNI-RU-all.txt"
          FLAGS=("🇺🇸" "🇩🇪" "🇫🇮" "🇵🇱" "🇳🇱" "🇬🇧" "🇫🇷" "🇰🇿" "🇹🇷" "🇸🇪" "🇦🇹" "🇨🇿")
          LIMIT=100

          # 2. Сохраняем твои текущие сервера (VIP)
          # Берем всё, что начинается на vless/vmess/ss/trojan, но НЕ содержит "Антизаглушка"
          touch README.md
          grep -E "^(vless|vmess|ss|trojan)://" README.md | grep -v "Антизаглушка" > my_vip.txt || touch my_vip.txt

          # 3. Скачиваем новые ключи
          curl -L -s "$SOURCE" -o incoming.txt
          
          # Очищаем от старых названий (все что после #) и берем только 100 штук
          grep -E "^(vless|vmess|ss|trojan)://" incoming.txt | cut -d'#' -f1 | head -n $LIMIT > source_cleaned.txt

          # 4. Собираем новый README.md
          # Заголовок и инфо
          echo "#subscription-userinfo: upload=0; download=0; total=1125899906842624; expire=3803572800" > README.md
          echo "#profile-title: АНТИЗАГЛУШКА" >> README.md
          echo "#profile-update-interval: 1" >> README.md
          echo "#announce: Обновлено: $(date +'%H:%M') ⚔️" >> README.md
          echo "happ://routing/bypass-lan-and-cn?name=Bypass+LAN+and+CN" >> README.md
          echo "" >> README.md

          # Вставляем твои сервера (как были)
          cat my_vip.txt >> README.md

          # Вставляем 100 новых серверов с твоим эмодзи и нумерацией
          IDX=1
          while IFS= read -r line; do
            RANDOM_FLAG=${FLAGS[$RANDOM % ${#FLAGS[@]}]}
            echo "${line}#${RANDOM_FLAG} Антизаглушка ⚔️ №$IDX" >> README.md
            IDX=$((IDX + 1))
          done < source_cleaned.txt

          # 5. Отчет в Telegram
          if [[ -n "$TG_TOKEN" ]]; then
            TOTAL=$(grep -c "://" README.md)
            MSG="⚔️ *АНТИЗАГЛУШКА ОБНОВЛЕНА*%0A%0A📊 Всего серверов: *$TOTAL*%0A🕒 Время: $(date +'%H:%M')"
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" -d "chat_id=$TG_CHAT_ID" -d "parse_mode=Markdown" -d "text=$MSG"
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Github Action"
          git add README.md
          git commit -m "Updated with 100 new keys ⚔️" || exit 0
          git push origin main
          
