name: Anti-Zaglushka Smart Sync 222

on:
  schedule:
    - cron: "0 */1 * * *" 
  workflow_dispatch:

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Fetch, Ping and Notify
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 1. Твои новые источники
          SOURCES=(
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
          )

          FLAGS=("🇺🇸" "🇩🇪" "🇫🇮" "🇵🇱" "🇳🇱" "🇬🇧" "🇫🇷" "🇰🇿" "🇹🇷" "🇸🇪" "🇦🇹" "🇨🇿")
          LIMIT=222 # Лимит серверов

          # 2. Подготовка файлов
          touch README.md
          grep "://" README.md | grep -v "🚀" > my_own_keys.txt || touch my_own_keys.txt
          grep "🚀" README.md > current_source_keys.txt || touch current_source_keys.txt
          
          cut -d'#' -f1 my_own_keys.txt > existing_urls.txt
          cut -d'#' -f1 current_source_keys.txt >> existing_urls.txt

          # 3. Сбор и проверка ключей из обоих источников
          > new_keys.txt
          NEW_ADDED=0
          for url in "${SOURCES[@]}"; do
            curl -L -s "$url" -o temp.txt
            if ! grep -q "://" temp.txt; then
              base64 -d temp.txt > raw_temp.txt 2>/dev/null || cp temp.txt raw_temp.txt
            else
              cp temp.txt raw_temp.txt
            fi

            while IFS= read -r line; do
              if [[ $line =~ ^(vless|vmess|trojan|ss):// ]]; then
                CLEAN_URL=$(echo "$line" | cut -d'#' -f1)
                if ! grep -q "$CLEAN_URL" existing_urls.txt; then
                  HOST=$(echo "$CLEAN_URL" | sed -e 's/.*@//' -e 's/:.*//' -e 's/\/.*//')
                  PORT=$(echo "$CLEAN_URL" | sed -e 's/.*://' -e 's/[?#\/].*//')
                  
                  if timeout 1.5s bash -c "true &>/dev/null > /dev/tcp/$HOST/$PORT" 2>/dev/null; then
                    RANDOM_FLAG=${FLAGS[$RANDOM % ${#FLAGS[@]}]}
                    echo "${CLEAN_URL}#${RANDOM_FLAG} Антизаглушка 🚀" >> new_keys.txt
                    NEW_ADDED=$((NEW_ADDED + 1))
                    echo "$CLEAN_URL" >> existing_urls.txt
                  fi
                fi
              fi
            done < raw_temp.txt
          done

          # 4. Умная очистка (Лимит 222)
          cat current_source_keys.txt >> new_keys.txt
          TOTAL_SOURCE_KEYS=$(wc -l < new_keys.txt)
          
          REMOVED=0
          if [ "$TOTAL_SOURCE_KEYS" -gt "$LIMIT" ]; then
             REMOVED=$((TOTAL_SOURCE_KEYS - LIMIT))
             tail -n "$LIMIT" new_keys.txt > cleaned_keys.txt
          else
             cp new_keys.txt cleaned_keys.txt
          fi

          # 5. Сборка README
          TRAFFIC_LINE=$(grep "#subscription-userinfo" README.md | head -n 1 || echo "#subscription-userinfo: upload=0; download=0; total=1125899906842624; expire=3803572800")
          echo "$TRAFFIC_LINE" > README.md
          echo "#profile-title: АНТИЗАГЛУШКА " >> README.md
          echo "#profile-update-interval: 1" >> README.md
          echo "#subscription-update-interval: 1" >> README.md
          echo "#announce:Обновлено! База: $LIMIT рабочих серверов. Удалено старых: $REMOVED" >> README.md
          echo "happ://routing/bypass-lan-and-cn?name=Bypass+LAN+and+CN" >> README.md
          echo "" >> README.md
          
          cat my_own_keys.txt >> README.md
          
          IDX=$(( $(wc -l < my_own_keys.txt) + 1 ))
          while IFS= read -r line; do
             echo "${line} №$IDX" >> README.md
             IDX=$((IDX + 1))
          done < cleaned_keys.txt

          # 6. Отчет в Telegram
          TOTAL_FINAL=$((IDX - 1))
          MSG="🚀 *Антизаглушка*%0A%0A✅ Новых (Rus-Mobile): *$NEW_ADDED*%0A🧹 Удалено старых: *$REMOVED*%0A📊 Всего в списке: *$TOTAL_FINAL*%0A🕒 Время: $(date +'%H:%M')"
          
          curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
            -d "chat_id=$TG_CHAT_ID" \
            -d "parse_mode=Markdown" \
            -d "text=$MSG"

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Github Action"
          git add README.md
          git commit -m "Update: Added 2 sources + Smart Limit 222" || exit 0
          git push origin main
          
