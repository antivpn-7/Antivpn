name: antizaglushka Smart Sync 222 TOTAL CLEAN MSK

on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Fetch, Ping and Notify
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 1. Настройки
          SOURCES=(
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
          )

          FLAGS=("🇺🇸" "🇩🇪" "🇫🇮" "🇵🇱" "🇳🇱" "🇬🇧" "🇫🇷" "🇰🇿" "🇹🇷" "🇸🇪" "🇦🇹" "🇨🇿")
          LIMIT=222

          # 2. Сохраняем VIP
          touch README.md
          grep "://" README.md | grep -v "Антизаглушка" > my_own_keys.txt || touch my_own_keys.txt
          grep "ОБХОД БЛОКИРОВКИ" README.md | cut -d'#' -f1 > existing_urls.txt

          # 3. Сбор новых ключей
          > new_keys.txt
          NEW_ADDED=0

          for url in "${SOURCES[@]}"; do
            curl -L -s "$url" -o temp.txt
            grep "://" temp.txt > raw_temp.txt || cp temp.txt raw_temp.txt

            while IFS= read -r line; do
              CLEAN_URL=$(echo "$line" | cut -d'#' -f1)

              if [[ $CLEAN_URL =~ ^(vless|vmess|trojan|ss):// ]] && ! grep -q "$CLEAN_URL" existing_urls.txt; then
                HOST=$(echo "$CLEAN_URL" | sed -e 's/.*@//' -e 's/:.*//' -e 's/\/.*//')
                PORT=$(echo "$CLEAN_URL" | sed -e 's/.*://' -e 's/[?#\/].*//')

                if timeout 1.2s bash -c "true &>/dev/null > /dev/tcp/$HOST/$PORT" 2>/dev/null; then
                  RANDOM_FLAG=${FLAGS[$RANDOM % ${#FLAGS[@]}]}
                  echo "${CLEAN_URL}#${RANDOM_FLAG} Антизаглушка 🚀" >> new_keys.txt
                  NEW_ADDED=$((NEW_ADDED + 1))
                  echo "$CLEAN_URL" >> existing_urls.txt
                fi
              fi
            done < raw_temp.txt
          done

          # 4. Формируем список
          grep "Антизаглушка" README.md > current_source_keys.txt || touch current_source_keys.txt
          cat new_keys.txt >> current_source_keys.txt

          # 5. Очистка до 222
          TOTAL_BEFORE=$(wc -l < current_source_keys.txt)
          REMOVED=0

          if [ "$TOTAL_BEFORE" -gt "$LIMIT" ]; then
            REMOVED=$((TOTAL_BEFORE - LIMIT))
            tail -n "$LIMIT" current_source_keys.txt > cleaned_source_keys.txt
          else
            cp current_source_keys.txt cleaned_source_keys.txt
          fi

          # 6. ПЕРЕЗАПИСЬ README (Время МСК и Удалено)
          export TZ="Europe/Moscow"
          TIME_NOW=$(date +'%H:%M')

          TRAFFIC_LINE=$(grep "#subscription-userinfo" README.md | head -n 1 || echo "#subscription-userinfo: upload=0; download=0; total=1125899906842624; expire=3803572800")

          echo "$TRAFFIC_LINE" > README.md
          echo "#profile-title: Антизаглушка" >> README.md
          echo "#profile-update-interval: 1" >> README.md
          echo "#subscription-update-interval: 1" >> README.md
          echo "#announce:Обновлено: $TIME_NOW | База: $LIMIT | Удалено: $REMOVED" >> README.md
          echo "happ://routing/bypass-lan-and-cn?name=Bypass+LAN+and+CN" >> README.md
          echo "" >> README.md

          # VIP ключи
          cat my_own_keys.txt >> README.md

          # Общие ключи с чистой нумерацией
          IDX=1
          while IFS= read -r line; do
            CLEAN_LINE=$(echo "$line" | sed 's/ №[0-9]*//g')
            echo "${CLEAN_LINE} №$IDX" >> README.md
            IDX=$((IDX + 1))
          done < cleaned_source_keys.txt

          # 7. Отчет в Telegram
          TOTAL_FINAL=$(( $(wc -l < my_own_keys.txt) + $(wc -l < cleaned_source_keys.txt) ))

          MSG="🚀 *Заглушка*%0A%0A📊 Всего: *$TOTAL_FINAL*%0A🕒 Время (МСК): *$TIME_NOW*%0A✅ Добавлено: *$NEW_ADDED*%0A🧹 Удалено старых: *$REMOVED*"

          curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
            -d "chat_id=$TG_CHAT_ID" \
            -d "parse_mode=Markdown" \
            -d "text=$MSG"

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Github Action"
          git add README.md
          git commit -m "Updated with MSK time $TIME_NOW and removal count" || exit 0
          git push origin main
