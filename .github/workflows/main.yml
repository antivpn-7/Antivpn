name: Anti-Zaglushka Multi-Source Sync

on:
  schedule:
    - cron: "0 */1 * * *" 
  workflow_dispatch:

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Fetch, Ping and Notify
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 1. Твои источники (Rus-Mobile 1 и 2)
          SOURCES=(
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
          )

          FLAGS=("🇺🇸" "🇩🇪" "🇫🇮" "🇵🇱" "🇳🇱" "🇬🇧" "🇫🇷" "🇰🇿" "🇹🇷" "🇸🇪" "🇦🇹" "🇨🇿")

          # 2. Сохраняем твои VIP серверы
          touch README.md
          grep "://" README.md | grep -v "🚀" > my_own_keys.txt || touch my_own_keys.txt
          MY_COUNT=$(grep -c "://" my_own_keys.txt || echo 0)
          COUNT=$((MY_COUNT + 1))
          
          cut -d'#' -f1 my_own_keys.txt > existing_urls.txt

          # 3. Пингуем новые ключи из обоих источников
          > alive_keys.txt
          NEW_ADDED=0
          for url in "${SOURCES[@]}"; do
            curl -L -s "$url" -o temp.txt
            # Проверка на base64 или обычный текст
            if ! grep -q "://" temp.txt; then
              base64 -d temp.txt > raw_temp.txt 2>/dev/null || cp temp.txt raw_temp.txt
            else
              cp temp.txt raw_temp.txt
            fi

            while IFS= read -r line; do
              if [[ $line =~ ^(vless|vmess|trojan|ss):// ]]; then
                CLEAN_URL=$(echo "$line" | cut -d'#' -f1)
                if ! grep -q "$CLEAN_URL" existing_urls.txt; then
                  HOST=$(echo "$CLEAN_URL" | sed -e 's/.*@//' -e 's/:.*//' -e 's/\/.*//')
                  PORT=$(echo "$CLEAN_URL" | sed -e 's/.*://' -e 's/[?#\/].*//')
                  
                  if timeout 1.5s bash -c "true &>/dev/null > /dev/tcp/$HOST/$PORT" 2>/dev/null; then
                    RANDOM_FLAG=${FLAGS[$RANDOM % ${#FLAGS[@]}]}
                    echo "${CLEAN_URL}#${RANDOM_FLAG} Антизаглушка 🚀 №$COUNT" >> alive_keys.txt
                    COUNT=$((COUNT + 1))
                    NEW_ADDED=$((NEW_ADDED + 1))
                    echo "$CLEAN_URL" >> existing_urls.txt
                  fi
                fi
              fi
            done < raw_temp.txt
          done

          # 4. Сборка файла
          TRAFFIC_LINE=$(grep "#subscription-userinfo" README.md | head -n 1 || echo "#subscription-userinfo: upload=0; download=0; total=1125899906842624; expire=3803572800")
          echo "$TRAFFIC_LINE" > README.md
          echo "#profile-title: АНТИЗАГЛУШКА " >> README.md
          echo "#profile-update-interval: 1" >> README.md
          echo "#subscription-update-interval: 1" >> README.md
          echo "#announce:Если VPN не работает нажмите 🔄 , после ⏱️ и выберите сервер с наименьшим показателем ms!" >> README.md
          echo "happ://routing/bypass-lan-and-cn?name=Bypass+LAN+and+CN" >> README.md
          echo "" >> README.md
          cat my_own_keys.txt >> README.md
          cat alive_keys.txt >> README.md

          # 5. Отправка отчета в Telegram
          TOTAL=$((COUNT - 1))
          MSG="🐺 *АНТИЗАГЛУШКА ОБНОВЛЕНА*%0A%0A✅ Добавлено новых: *$NEW_ADDED*%0A📊 Всего серверов: *$TOTAL*%0A🕒 Время: $(date +'%H:%M')"
          
          curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
            -d "chat_id=$TG_CHAT_ID" \
            -d "parse_mode=Markdown" \
            -d "text=$MSG"

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Github Action"
          git add README.md
          git commit -m "Update: Added Rus-Mobile sources + TG notify" || exit 0
          git push origin main
          
