name: Anti-Zaglushka MSK Timer Clean Title

on:
  schedule:
    - cron: "0 */1 * * *" 
  workflow_dispatch:

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Fetch, Ping and Sync
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 1. Настройки
          SOURCES=(
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
          )
          FLAGS=("🇺🇸" "🇩🇪" "🇫🇮" "🇵🇱" "🇳🇱" "🇬🇧" "🇫🇷" "🇰🇿" "🇹🇷" "🇸🇪" "🇦🇹" "🇨🇿")
          LIMIT=222

          # 2. Подготовка (сохраняем VIP)
          touch README.md
          grep "://" README.md | grep -v "Антизаглушка" | grep -v "---" | grep -v "ОБНОВЛЕНО" > my_own_keys.txt || touch my_own_keys.txt
          grep "://" README.md | cut -d'#' -f1 > existing_urls.txt

          # 3. Сбор новых ключей (Тайм-аут 1.3с)
          > new_keys.txt
          NEW_ADDED=0
          for url in "${SOURCES[@]}"; do
            curl -L -s --retry 3 "$url" -o temp.txt
            grep "://" temp.txt > raw_temp.txt || cp temp.txt raw_temp.txt

            while IFS= read -r line; do
              CLEAN_URL=$(echo "$line" | cut -d'#' -f1)
              if [[ $CLEAN_URL =~ ^(vless|vmess|trojan|ss):// ]] && ! grep -q "$CLEAN_URL" existing_urls.txt; then
                HOST=$(echo "$CLEAN_URL" | sed -e 's/.*@//' -e 's/:.*//' -e 's/\/.*//')
                PORT=$(echo "$CLEAN_URL" | sed -e 's/.*://' -e 's/[?#\/].*//')
                if timeout 1.3s bash -c "true &>/dev/null > /dev/tcp/$HOST/$PORT" 2>/dev/null; then
                  RANDOM_FLAG=${FLAGS[$RANDOM % ${#FLAGS[@]}]}
                  echo "${CLEAN_URL}#${RANDOM_FLAG} Антизаглушка 🚀" >> new_keys.txt
                  NEW_ADDED=$=$((NEW_ADDED + 1))
                  echo "$CLEAN_URL" >> existing_urls.txt
                fi
              fi
            done < raw_temp.txt
          done

          # 4. Очистка до лимита
          grep "ОБХОД БЛОКИРОВКИ" README.md > current_source_keys.txt || touch current_source_keys.txt
          cat new_keys.txt >> current_source_keys.txt
          TOTAL_BEFORE=$(wc -l < current_source_keys.txt)
          REMOVED=0
          if [ "$TOTAL_BEFORE" -gt "$LIMIT" ]; then
             REMOVED=$((TOTAL_BEFORE - LIMIT))
             tail -n "$LIMIT" current_source_keys.txt > cleaned_source_keys.txt
          else
             cp current_source_keys.txt cleaned_source_keys.txt
          fi

          # 5. СБОРКА README (Чистый заголовок + МСК Таймер)
          export TZ="Europe/Moscow"
          TIME_NOW=$(date +'%H:%M')
          
          CURRENT_MIN=$(date +'%M')
          MIN_LEFT=$((60 - 10#$CURRENT_MIN))
          
          TRAFFIC_LINE=$(grep "#subscription-userinfo" README.md | head -n 1 || echo "#subscription-userinfo: upload=0; download=0; total=1125899906842624; expire=3803572800")
          
          echo "$TRAFFIC_LINE" > README.md
          echo "#profile-title: АНТИЗАГЛУШКА" >> README.md
          echo "#profile-update-interval: 1" >> README.md
          echo "#subscription-update-interval: 1" >> README.md
          echo "#announce:✅ Обновлено: $TIME_NOW (МСК) | 🕒 След. обнова через: $MIN_LEFT мин | 🧹 Удалено: $REMOVED" >> README.md
          echo "happ://routing/bypass-lan-and-cn?name=Bypass+LAN+and+CN" >> README.md
          echo "" >> README.md
          
          # Инфо-строка
          RAND_ID=$(cat /dev/urandom | tr -dc 'a-z0-9' | fold -w 8 | head -n 1)
          echo "vless://$RAND_ID@1.1.1.1:443?security=reality#🕒 ОБНОВЛЕНО В $TIME_NOW (МСК)" >> README.md
          
          # Разделители
          echo "vless://0@1.1.1.1:443?security=reality#--- 💎 ТВОИ VIP СЕРВЕРЫ 💎 ---" >> README.md
          cat my_own_keys.txt >> README.md
          echo "" >> README.md
          echo "vless://0@1.1.1.1:443?security=reality#--- 🚀 ОБЩАЯ БАЗА ($LIMIT) ---" >> README.md
          
          IDX=1
          sort cleaned_source_keys.txt | while IFS= read -r line; do
             CLEAN_LINE=$(echo "$line" | sed 's/ №[0-9]*//g')
             echo "${CLEAN_LINE} №$IDX" >> README.md
             IDX=$((IDX + 1))
          done

          # 6. Телеграм отчет
          MSG="👑 *ОБНОВЛЕНИЕ АНТИЗАГЛУШКИ*%0A🕒 Сейчас: *$TIME_NOW*%0A⏳ До новой базы: *$MIN_LEFT мин*%0A✅ Новых: *$NEW_ADDED*%0A🧹 Удалено: *$REMOVED*"
          curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" -d "chat_id=$TG_CHAT_ID" -d "parse_mode=Markdown" -d "text=$MSG"

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Github Action"
          git add README.md
          git commit -m "Title Update $TIME_NOW" || exit 0
          git push origin main
          
